; UnsupportedFieldAttributeWarning below is a benign pydantic 2.13 quirk: it
; fires when alias_generator(to_camel) happens to produce the same alias as
; the field name (single-word fields like `content`), even though the
; Annotated Field() constraints are honored fine (see
; test_create_post_rejects_content_over_max_length).
[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore:.*was provided to the .Field\(\). function, which has no effect.*:pydantic.warnings.UnsupportedFieldAttributeWarning
